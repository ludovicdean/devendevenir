name: Deploy to GitHub Pages with Preview

on:
  push:
    branches:
      - '**'

permissions:
  contents: read
  pages: write
  id-token: write

env:
  ASTRO_BASE: ${{ github.ref == 'refs/heads/main' && '/devendevenir' || '/devendevenir' }}
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/devendevenir

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Debug ASTRO_BASE
        run: |
          echo "Branch: $GITHUB_REF"
          echo "ASTRO_BASE=$ASTRO_BASE"
          echo "ASTRO_BASE content: '${ASTRO_BASE}'"

      - uses: withastro/action@v2.0.0
        env:
          ASTRO_BASE: ${{ env.ASTRO_BASE }}

      - name: Deploy to production GitHub Pages (main branch)
        if: github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4.0.5

  build-and-push:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          build-args: |
      ASTRO_BASE=/devendevenir

  deploy-homeserver:
    runs-on: self-hosted
    needs: build-and-push
    if: always() && needs.build-and-push.result == 'success'

    steps:
      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Deploy
        run: |
          docker pull ${{ env.IMAGE_NAME }}:latest
          docker stop devendevenir || true
          docker rm devendevenir || true
          docker run -d \
            --name devendevenir \
            --restart unless-stopped \
            -p 127.0.0.1:3001:80 \
            ${{ env.IMAGE_NAME }}:latest